<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Katy's Store</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'store:product_list' %}">Katy's Store</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-5">
        <h2 class="mb-4">Checkout</h2>
        <div class="row">
            <!-- Shipping and Payment Form -->
            <div class="col-md-8 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Billing & Shipping Details</h4>
                    </div>
                    <div class="card-body">
                        <form action="{% url 'orders:checkout' %}" method="post" id="payment-form">
                            {% csrf_token %}
                            
                            <h5 class="mb-3">Shipping Address</h5>
                            <div class="mb-3">
                                <label for="address" class="form-label">Street Address</label>
                                <input type="text" class="form-control" id="address" name="address" required>
                            </div>
                            <div class="row">
                                <div class="col-md-5 mb-3">
                                    <label for="city" class="form-label">City</label>
                                    <input type="text" class="form-control" id="city" name="city" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="state" class="form-label">State</label>
                                    <input type="text" class="form-control" id="state" name="state" required>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="pincode" class="form-label">Pincode</label>
                                    <input type="text" class="form-control" id="pincode" name="pincode" required>
                                </div>
                            </div>

                            <hr class="my-4">

                            <h5 class="mb-3">Payment Method</h5>
                            <div class="form-check mb-2">
                                <input id="credit" name="paymentMethod" type="radio" class="form-check-input" value="stripe" checked required>
                                <label class="form-check-label" for="credit">Credit card (Stripe)</label>
                            </div>
                            <div class="form-check mb-4">
                                <input id="razorpay" name="paymentMethod" type="radio" class="form-check-input" value="razorpay" required>
                                <label class="form-check-label" for="razorpay">Razorpay</label>
                            </div>

                            <button class="btn btn-success btn-lg w-100" type="submit">Place Order & Pay</button>
                            <a href="{% url 'orders:order_history' %}" class="btn btn-outline-secondary w-100 mt-2">View Order History</a>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Order Summary Sidebar -->
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-light">
                        <h4 class="mb-0 text-muted">Order Summary</h4>
                    </div>
                    <div class="card-body p-0">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item d-flex justify-content-between bg-light p-3">
                                <span class="fs-5">Total to Pay:</span>
                                <strong class="fs-5">₹{{ cart.get_total_price }}</strong>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
    </div>
</div>
</body></html>
