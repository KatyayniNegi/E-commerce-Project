<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Orders - Katy's Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5">
        <h2 class="mb-4">My Order History & Tracking</h2>

        {% if orders %}
            <div class="list-group">
                {% for order in orders %}
                    <div class="list-group-item d-flex justify-content-between align-items-center mb-3 p-3 shadow-sm rounded">
                        <div>
                            <h5 class="mb-1">Order #{{ order.id }}</h5>
                            <p class="mb-1 text-muted">Placed on: {{ order.created_at }}</p>
                            <p class="mb-0 fw-bold">Total: ₹{{ order.total_amount }}</p>
                        </div>
                        <div>
                            <a href="{% url 'orders:order_detail' order.id %}" class="btn btn-primary btn-sm">
                                Track Status & Details
                            </a>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="alert alert-warning">
                You haven't placed any orders yet! Complete a checkout first.
            </div>
        {% endif %}

        <a href="{% url 'store:product_list' %}" class="btn btn-secondary mt-3">Back to Store</a>
    </div>
</body>
</html>
