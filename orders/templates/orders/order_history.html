<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order History - Katy's Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'store:product_list' %}">Katy's Store</a>
        </div>
    </nav>

    <div class="container text-center my-5">
        <div class="card shadow-sm p-5 bg-white">

            <a href="{% url 'store:product_list' %}" class="btn btn-primary btn-lg">Continue Shopping</a>
        </div>
    </div>
