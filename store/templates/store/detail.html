<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!--Navigation Bar-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
         <!-- Store Brand /Title -->
          <a class="navbar-brand fw-bold" href="{%url 'store:product_list' %}">Katy's Store</a><a href=""></a>
        
          <!--Cart Icon/Link-->
          <div class="d-flex ms-auto">
            <a href="{% url 'cart:cart_detail'%}" class="btn btn-outline-light position-relative">
                🛒Cart
            </a>
          </div>
        </div>
    </nav>
<div class="container my-5">
    <a href="{% url 'store:product_list' %}" class="btn btn-secondary mb-3">&larr; Back to Shop</a>
    
    <div class="card shadow p-4">
        <div class="row">
            <div class="col-md-6">
                {% if product.image %}
                    <img src="{{ product.image.url }}" class="card-img-top img-fluid rounded" alt="{{ product.name }}">
                {% else %}
                    <div class="bg-secondary text-white p-5 text-center">No Image Available</div>
                {% endif %}
            </div>
            <div class="col-md-6">
                <h2>{{ product.name }}</h2>
                <h4 class="text-success">₹{{ product.price }}</h4>
                <p class="mt-3">{{ product.description }}</p>
                <p><strong>Stock:</strong> {{ product.stock }} available</p>
                
                <form action="{% url 'cart:cart_add' product.id %}" method="post" class="mt-3">
    {% csrf_token %}
    <div class="mb-3 d-flex align-items-center gap-2">
        <label for="quantity" class="form-label mb-0 fw-bold">Qty:</label>
        <input type="number" name="quantity" id="quantity" value="1" min="1" class="form-control" style="width: 80px;">
    </div>
    <button type="submit" class="btn btn-success btn-lg">
        Add to Cart
    </button>
</form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
